<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>D.E.Sy Network Redirecting...</title>
<meta http-equiv="refresh" content="0; url=index-en.html">
<script>
// Detect browser language and redirect
var lang = navigator.language || navigator.userLanguage;
if (lang.startsWith('it')) {
  window.location.href = 'index-it.html';
} else if (lang.startsWith('fr')) {
  window.location.href = 'index-fr.html';
} else {
  window.location.href = 'index-en.html';
}
</script>
</head>
<body>
<p>Redirecting to your language... <a href="index-en.html">English</a> | <a href="index-it.html">Italiano</a> | <a href="index-fr.html">Français</a></p>
</body>
</html>
